<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piddu Loves Shana ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: linear-gradient(270deg, #ff6a88, #ff99ac, #ffdde1);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    color: white;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.5rem;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
    }
    to {
        text-shadow: 0 0 20px #fff, 0 0 40px #ff1e56;
    }
}

.heart {
    font-size: 3rem;
    animation: heartbeat 1s infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

.subtitle {
    margin-top: 10px;
    font-size: 1.2rem;
    opacity: 0.9;
}

/* Floating Hearts */
.heart-float {
    position: absolute;
    bottom: -10px;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
    }
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff4d6d;
    color: white;
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>Piddu Loves Shana</h1>
    <div class="heart">❤️</div>
    <div class="subtitle">Forever & Always 💖</div>
    <button class="btn" onclick="showLove()">Tap Me ❤️</button>
</div>

<script>
// Floating hearts generator
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart-float");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);

// Button interaction
function showLove() {
    alert("Piddu ❤️ Shana - Infinite Love!");
}
</script>

</body>
</html>
